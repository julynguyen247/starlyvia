services:
  postgres:
    image: postgres:16-alpine
    container_name: starlyvia-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: starlyvia
      POSTGRES_PASSWORD: starlyvia
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starlyvia -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    container_name: starlyvia-auth-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: starlyvia
      SPRING_DATASOURCE_PASSWORD: starlyvia
      JWT_SECRET: starlyvia-super-secret-key-starlyvia-super-secret-key
      JWT_EXPIRATION: 36000000
    ports:
      - "8081:8081"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: starlyvia-api-gateway
    depends_on:
      - auth-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      JWT_SECRET: starlyvia-super-secret-key-starlyvia-super-secret-key
    ports:
      - "8080:8080"

volumes:
  postgres-data:
