server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:3000"
                  - "http://127.0.0.1:3000"
                  - "http://localhost:5173"
                  - "http://127.0.0.1:5173"
                  - "http://localhost:8080"
                  - "http://127.0.0.1:8080"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - "*"
                exposed-headers:
                  - Authorization
                  - Location
                allow-credentials: true
                max-age: 3600
          routes:
            - id: auth-service-openapi
              uri: ${auth.service.url}
              predicates:
                - Path=/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
            - id: auth-service
              uri: ${auth.service.url}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - JwtValidation
            - id: friend-service
              uri: ${friend.service.url}
              predicates:
                - Path=/api/v1/friends/**
              filters:
                - JwtValidation

auth:
  service:
    url: http://localhost:8081

friend:
  service:
    url: http://localhost:8082

jwt:
  secret: "starlyvia-super-secret-key-starlyvia-super-secret-key"
